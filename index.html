<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warframe 物品词典 | 极光版</title>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+SC:wght@400;700&display=swap');

        :root {
            --bg: #05050b;
            --primary: #00f0ff;
            --secondary: #ff0055;
            --tertiary: #b000ff;
            --glass: rgba(15, 15, 25, 0.6);
            --border: rgba(0, 240, 255, 0.3);
            --text-main: #e0fbfc;
            --text-dim: #8b9bb4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.15), transparent 40%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.15), transparent 40%);
        }

        /* 动态背景光球 */
        .orb {
            position: fixed;
            width: 40vw; height: 40vw;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            animation: float 20s infinite alternate;
        }
        .orb-1 { top: -10%; left: -10%; background: var(--tertiary); opacity: 0.3; }
        .orb-2 { bottom: -10%; right: -10%; background: var(--primary); opacity: 0.2; animation-delay: -10s; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(10%, 15%); }
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 50px;
            margin-bottom: 50px;
        }

        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(90deg, var(--primary), #ffffff, var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.4);
            letter-spacing: 2px;
        }
        p.subtitle { color: var(--text-dim); margin-top: 10px; font-size: 1.1rem; letter-spacing: 1px; }

        /* 搜索框与控制栏 */
        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .search-box {
            flex: 1;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 18px 25px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: white;
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.3);
            background: rgba(15, 15, 25, 0.8);
        }

        button.btn-update {
            padding: 0 30px;
            border-radius: 15px;
            border: none;
            background: linear-gradient(45deg, var(--tertiary), var(--secondary));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.4);
        }
        button.btn-update:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.7);
        }
        button.btn-update:active { transform: translateY(1px); }

        /* 数据表格面板 */
        .table-panel {
            background: var(--glass);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .table-header {
            display: flex;
            background: rgba(0,0,0,0.4);
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: bold;
            color: var(--primary);
            letter-spacing: 2px;
            font-size: 1.1rem;
        }

        .table-body {
            max-height: 60vh;
            overflow-y: auto;
        }

        /* 自定义滚动条 */
        .table-body::-webkit-scrollbar { width: 8px; }
        .table-body::-webkit-scrollbar-track { background: transparent; }
        .table-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .row {
            display: flex;
            padding: 16px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: background 0.2s;
        }
        .row:hover { background: rgba(0, 240, 255, 0.08); }

        .col { flex: 1; }
        .col.zh { font-weight: 700; font-size: 1.1rem; }
        .col.en { color: var(--text-dim); font-family: 'Orbitron', sans-serif; }

        .status-msg { text-align: center; padding: 50px; color: var(--text-dim); font-size: 1.2rem; }
        
        .loading-spinner {
            display: inline-block;
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        footer { margin-top: auto; padding: 20px; text-align: center; color: var(--text-dim); font-size: 0.9rem; }
        footer span { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [items, setItems] = useState([]);
            const [search, setSearch] = useState('');
            const [loading, setLoading] = useState(true);
            const [updating, setUpdating] = useState(false);
            const [error, setError] = useState('');

            // 初次加载本地数据
            const loadData = async () => {
                setLoading(true);
                setError('');
                try {
                    const res = await fetch('http://localhost:3000/api/items');
                    if (!res.ok) throw new Error('网络响应异常');
                    const data = await res.json();
                    setItems(data);
                } catch (err) {
                    setError('无法连接到后端服务器，请确保服务器正在运行 (node server.js)。');
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => { loadData(); }, []);

            // 触发后端强制更新
            const handleUpdate = async () => {
                if(updating) return;
                setUpdating(true);
                try {
                    const res = await fetch('http://localhost:3000/api/update', { method: 'POST' });
                    if(res.ok) {
                        alert('服务器数据更新成功！');
                        loadData(); // 重新加载数据
                    } else {
                        alert('更新失败，请重试。');
                    }
                } catch (err) {
                    alert('无法连接服务器。');
                } finally {
                    setUpdating(false);
                }
            };

            // 实时搜索过滤
            const filteredItems = useMemo(() => {
                if (!search.trim()) return items;
                const q = search.toLowerCase();
                return items.filter(item => 
                    item.zh.toLowerCase().includes(q) || 
                    item.en.toLowerCase().includes(q)
                );
            }, [items, search]);

            return (
                <div className="container">
                    <header>
                        <h1>NEXUS LEXICON</h1>
                        <p className="subtitle">Warframe.Market 纯净双语数据中枢</p>
                    </header>

                    <div className="controls">
                        <div className="search-box">
                            <input 
                                type="text" 
                                placeholder="输入中文或英文检索物品..." 
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                        <button className="btn-update" onClick={handleUpdate}>
                            {updating ? '🔄 同步中...' : '✦ 强制更新数据'}
                        </button>
                    </div>

                    <div className="table-panel">
                        <div className="table-header">
                            <div className="col">中 文 名 称</div>
                            <div className="col" style={{textAlign:'right'}}>ENGLISH NAME</div>
                        </div>

                        <div className="table-body">
                            {loading && (
                                <div className="status-msg">
                                    <div className="loading-spinner"></div>
                                    <div>正在建立神经链接并读取本地数据...</div>
                                </div>
                            )}

                            {error && <div className="status-msg" style={{color: 'var(--secondary)'}}>{error}</div>}

                            {!loading && !error && filteredItems.length === 0 && (
                                <div className="status-msg">🕸️ 虚空之中一无所获。尝试其他关键字？</div>
                            )}

                            {!loading && !error && filteredItems.map((item, idx) => (
                                <div className="row" key={idx}>
                                    <div className="col zh">{item.zh}</div>
                                    <div className="col en" style={{textAlign:'right'}}>{item.en}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <>
                <App />
                <footer>
                    Project by <span>ROC</span> | Data from <span>Warframe.Market API V2</span>
                </footer>
            </>
        );
    </script>
</body>
</html>
