        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&family=Noto+Sans+SC:wght@400;700&display=swap');

        :root {
            --bg: #05050b;
            --primary: #00f0ff;
            --secondary: #ff0055;
            --tertiary: #b000ff;
            --glass: rgba(15, 15, 25, 0.65);
            --border: rgba(0, 240, 255, 0.25);
            --text-main: #e0fbfc;
            --text-dim: #8b9bb4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 240, 255, 0.1), transparent 45%),
                radial-gradient(circle at 85% 30%, rgba(255, 0, 85, 0.1), transparent 45%);
        }

        /* 动态背景光球 */
        .orb {
            position: fixed; width: 45vw; height: 45vw; border-radius: 50%;
            filter: blur(120px); z-index: -1; animation: float 25s infinite alternate ease-in-out;
        }
        .orb-1 { top: -10%; left: -10%; background: var(--tertiary); opacity: 0.25; }
        .orb-2 { bottom: -10%; right: -10%; background: var(--primary); opacity: 0.15; animation-delay: -10s; }

        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 100% { transform: translate(8%, 12%) scale(1.1); } }

        .container { width: 95%; max-width: 1100px; margin-top: 60px; margin-bottom: 50px; flex: 1; display: flex; flex-direction: column;}

        /* 顶部标题栏 */
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-family: 'Orbitron', sans-serif; font-size: 3.2rem; font-weight: 800;
            background: linear-gradient(90deg, var(--primary), #ffffff, var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.3); letter-spacing: 3px; margin-bottom: 10px;
        }
        p.subtitle { color: var(--text-dim); font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; }

        /* 搜索与工具栏 */
        .toolbar {
            display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; align-items: center;
            background: var(--glass); padding: 25px; border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(20px);
        }
        .search-box { flex: 1; min-width: 300px; position: relative; }
        .search-box input {
            width: 100%; padding: 18px 25px; border-radius: 12px; border: 1px solid var(--border);
            background: rgba(0,0,0,0.6); color: white; font-size: 1.2rem; outline: none;
            transition: all 0.3s ease; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 240, 255, 0.4), inset 0 2px 10px rgba(0,0,0,0.5); }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }

        .export-btns { display: flex; gap: 12px; flex-wrap: wrap; }
        button.btn {
            padding: 12px 24px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05); color: white; cursor: pointer;
            transition: all 0.2s ease; font-family: 'Orbitron', 'Noto Sans SC', sans-serif; font-size: 0.95rem; font-weight: bold; letter-spacing: 1px;
        }
        button.btn:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0, 240, 255, 0.2); }
        button.btn-excel { background: linear-gradient(45deg, #00b09b, #96c93d); border: none; color: #000; box-shadow: 0 5px 15px rgba(0, 255, 136, 0.2); }
        button.btn-excel:hover { box-shadow: 0 8px 25px rgba(0, 255, 136, 0.5); background: linear-gradient(45deg, #02c7b0, #a8df45); }

        /* 数据表格面板 */
        .table-panel {
            background: var(--glass); border: 1px solid var(--border); border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); display: flex; flex-direction: column; flex: 1;
            backdrop-filter: blur(25px);
        }
        .table-header {
            display: flex; background: rgba(0,0,0,0.7); padding: 20px 30px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.2); font-weight: bold; color: var(--primary); 
            letter-spacing: 2px; font-size: 1.1rem;
        }
        .table-body { max-height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
        
        /* 自定义滚动条 */
        .table-body::-webkit-scrollbar { width: 10px; }
        .table-body::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        .table-body::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.3); border-radius: 5px; }
        .table-body::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.6); }
        
        .row { display: flex; padding: 16px 30px; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.2s; align-items: center;}
        .row:hover { background: rgba(0, 240, 255, 0.08); }
        .col-id { width: 70px; color: var(--secondary); font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: bold; }
        .col-zh { flex: 1; font-weight: 700; font-size: 1.15rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .col-en { flex: 1; color: var(--text-dim); font-family: 'Orbitron', sans-serif; text-align: right; font-size: 1.05rem;}

        .status-msg { text-align: center; padding: 60px; color: var(--text-dim); font-size: 1.2rem; letter-spacing: 1px; }
        .data-count { text-align: right; padding: 15px 30px; background: rgba(0,0,0,0.5); font-family: 'Orbitron', sans-serif; color: var(--text-faint); font-size: 0.9rem;}

        footer { padding: 30px; text-align: center; color: var(--text-dim); font-size: 0.9rem; width: 100%; border-top: 1px solid rgba(255,255,255,0.05); margin-top: auto; background: rgba(0,0,0,0.6); letter-spacing: 1px;}
        footer span { color: var(--primary); font-weight: bold; }
    </style>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [items, setItems] = useState([]);
            const [search, setSearch] = useState('');

            // 初始化：解析内嵌的文本数据
            useEffect(() => {
                const rawText = document.getElementById('data-source').textContent;
                const lines = rawText.split('\n');
                
                const parsedItems = [];
                let lineId = 1;

                lines.forEach(line => {
                    const trimmed = line.trim();
                    if (!trimmed) return;
                    
                    // 解析 "中文 --> English" 格式
                    const parts = trimmed.split('-->');
                    if (parts.length === 2) {
                        parsedItems.push({
                            id: lineId++,
                            zh: parts[0].trim(),
                            en: parts[1].trim()
                        });
                    }
                });

                setItems(parsedItems);
            }, []);

            // 实时检索
            const filteredItems = useMemo(() => {
                if (!search.trim()) return items;
                const q = search.toLowerCase();
                return items.filter(item => 
                    item.zh.toLowerCase().includes(q) || 
                    item.en.toLowerCase().includes(q)
                );
            }, [items, search]);

            // 为了保证性能，即使匹配出数千条，渲染时最多展示前 500 条
            // (导出时依然会导出所有过滤后的条目)
            const displayItems = filteredItems.slice(0, 500);

            /* =============== 多格式导出工具链 =============== */
            const downloadBlob = (filename, content, mimeType) => {
                const blob = new Blob([content], { type: mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = filename;
                document.body.appendChild(a); a.click();
                document.body.removeChild(a); URL.revokeObjectURL(url);
            };

            const exportCSV = () => {
                const csv = '\ufeff' + ['序号,中文,English', ...filteredItems.map(r => `${r.id},"${r.zh.replace(/"/g, '""')}","${r.en.replace(/"/g, '""')}"`)].join('\r\n');
                downloadBlob('warframe_lexicon.csv', csv, 'text/csv;charset=utf-8;');
            };

            const exportTSV = () => {
                const tsv = '\ufeff' + ['序号\t中文\tEnglish', ...filteredItems.map(r => `${r.id}\t${r.zh}\t${r.en}`)].join('\r\n');
                downloadBlob('warframe_lexicon.tsv', tsv, 'text/tab-separated-values;charset=utf-8;');
            };

            const exportJSON = () => {
                const json = JSON.stringify(filteredItems.map(r => ({ 序号: r.id, 中文: r.zh, English: r.en })), null, 2);
                downloadBlob('warframe_lexicon.json', json, 'application/json');
            };

            const exportMD = () => {
                const md = ['| 序号 | 中文 | English |', '| --- | --- | --- |', ...filteredItems.map(r => `| ${r.id} | ${r.zh} | ${r.en} |`)].join('\n');
                downloadBlob('warframe_lexicon.md', md, 'text/markdown');
            };

            const exportExcel = () => {
                const data = [['序号', '中文名称', 'English Name'], ...filteredItems.map(r => [r.id, r.zh, r.en])];
                const ws = XLSX.utils.aoa_to_sheet(data);
                ws['!cols'] = [{ wch: 8 }, { wch: 40 }, { wch: 50 }]; 
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, 'Warframe Lexicon');
                XLSX.writeFile(wb, 'warframe_lexicon.xlsx');
            };

            return (
                <div className="container">
                    <header>
                        <h1>NEXUS LEXICON</h1>
                        <p className="subtitle">Warframe 纯静态内嵌双语检索系统</p>
                    </header>

                    <div className="toolbar">
                        <div className="search-box">
                            <input 
                                type="text" 
                                placeholder="输入中文或英文关键字极速检索..." 
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                            />
                        </div>
                        <div className="export-btns">
                            <button className="btn btn-excel" onClick={exportExcel}>📊 导出 Excel</button>
                            <button className="btn" onClick={exportCSV}>CSV</button>
                            <button className="btn" onClick={exportTSV}>TSV</button>
                            <button className="btn" onClick={exportJSON}>JSON</button>
                            <button className="btn" onClick={exportMD}>Markdown</button>
                        </div>
                    </div>

                    <div className="table-panel">
                        <div className="table-header">
                            <div className="col-id">#</div>
                            <div className="col-zh">中 文 名 称</div>
                            <div className="col-en">ENGLISH NAME</div>
                        </div>
                        <div className="table-body">
                            {displayItems.length === 0 ? (
                                <div className="status-msg">🕸️ 虚空之中一无所获。</div>
                            ) : (
                                displayItems.map((item) => (
                                    <div className="row" key={item.id}>
                                        <div className="col-id">{String(item.id).padStart(3, '0')}</div>
                                        <div className="col-zh">{item.zh}</div>
                                        <div className="col-en">{item.en}</div>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="data-count">
                            展示 {displayItems.length} 条 / 匹配 {filteredItems.length} 条 / 共 {items.length} 条数据
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    
    <footer>
