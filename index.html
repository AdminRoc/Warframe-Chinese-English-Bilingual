<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useCallback } = React;

/* ============ EXPORTERS ============ */
function csvEscape(s) { const v = String(s ?? ''); return /[",\n\r]/.test(v) ? '"' + v.replace(/"/g, '""') + '"' : v; }
function buildCSV(rows) { return '\ufeff' + ['序号,中文,English', ...rows.map(r => [r.id, r.zh, r.en].map(csvEscape).join(','))].join('\r\n'); }
function buildTSV(rows) { return '\ufeff' + ['序号\t中文\tEnglish', ...rows.map(r => r.id + '\t' + (r.zh || '').replace(/\t/g, ' ') + '\t' + (r.en || '').replace(/\t/g, ' '))].join('\r\n'); }
function buildJSON(rows) { return JSON.stringify(rows.map(r => ({ 序号: r.id, 中文: r.zh, English: r.en })), null, 2); }
function buildMD(rows) { return ['| 序号 | 中文 | English |', '| --- | --- | --- |', ...rows.map(r => `| ${r.id} | ${(r.zh || '').replace(/\|/g, '\\|')} | ${(r.en || '').replace(/\|/g, '\\|')} |`)].join('\n'); }
function buildXLSX(rows) {
  const data = [['序号', '中文', 'English'], ...rows.map(r => [r.id, r.zh, r.en])];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 10 }, { wch: 36 }, { wch: 44 }];
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };
  ws['!autofilter'] = { ref: `A1:C${data.length}` };
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Warframe Bilingual');
  wb.Props = { Title: 'Warframe 中英文物品对照表', Subject: 'Static mapped item names', Author: 'Roc', Company: 'CSC联盟', CreatedDate: new Date() };
  return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
}
function downloadBlob(filename, content, mime) {
  const blob = content instanceof Uint8Array || content instanceof ArrayBuffer
    ? new Blob([content], { type: mime })
    : new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function Stat({ k, v, sub, c1, c2, gradient }) {
  return (
    <div className="stat" style={{ '--c1': c1, '--c2': c2 }}>
      <div className="k">{k}</div>
      <div className={'v ' + (gradient ? 'gradient' : '')}>{v}</div>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );
}
function SearchIcon() {
  return (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>);
}

function App() {
  const [rows, setRows] = useState([]);
  const [filter, setFilter] = useState('');
  const [toast, setToast] = useState(null);

  const flashToast = useCallback((msg) => { setToast({ id: Date.now(), msg }); setTimeout(() => setToast(null), 2600); }, []);

  useEffect(() => {
    const zhText = document.getElementById('data-zh').textContent.trim().split(/\r?\n/);
    const enText = document.getElementById('data-en').textContent.trim().split(/\r?\n/);
    
    const maxLen = Math.max(zhText.length, enText.length);
    const parsedRows = [];
    
    for (let i = 0; i < maxLen; i++) {
        const zh = (zhText[i] || '').replace(/\\s*/g, '').trim();
        const en = (enText[i] || '').replace(/\\s*/g, '').trim();
        if (zh || en) {
            parsedRows.push({ id: i + 1, zh, en });
        }
    }
    setRows(parsedRows);
  }, []);

  const visibleRows = useMemo(() => {
    let r = rows;
    if (filter.trim()) {
      const q = filter.trim().toLowerCase();
      r = r.filter(x => x.zh.toLowerCase().includes(q) || x.en.toLowerCase().includes(q));
    }
    return r;
  }, [rows, filter]);

  const doExport = useCallback((format) => {
    if (!visibleRows.length) return;
    const date = new Date().toISOString().slice(0, 10);
    const stem = `warframe-bilingual_${date}`;
    if (format === 'csv')       downloadBlob(stem + '.csv',  buildCSV(visibleRows),  'text/csv');
    else if (format === 'tsv')  downloadBlob(stem + '.tsv',  buildTSV(visibleRows),  'text/tab-separated-values');
    else if (format === 'json') downloadBlob(stem + '.json', buildJSON(visibleRows), 'application/json');
    else if (format === 'md')   downloadBlob(stem + '.md',   buildMD(visibleRows),   'text/markdown');
    else if (format === 'xlsx') downloadBlob(stem + '.xlsx', buildXLSX(visibleRows), 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet');
    flashToast(`已导出 ${visibleRows.length} 项 (${format.toUpperCase()})`);
  }, [visibleRows, flashToast]);

  return (
    <div className="app">
      <header className="hero">
        <div className="hero-row">
          <div className="hero-left">
            <span className="eyebrow"><span className="pulse"></span>WARFRAME · MARKETPLACE LEXICON<span className="div"></span>v4 · STATIC DB</span>
            <h1 className="title"><span className="cn">中英对照</span><span className="en">BILINGUAL ITEM ATLAS</span></h1>
            <p className="lead">基于 <code>warframe.market</code> <strong>V2 API</strong>，已获取所有的可交易物品名称<br/>可导出 <strong>Excel / CSV / TSV / JSON / Markdown</strong>。</p>
          </div>
          <div className="author-card">
            <div className="author-label">AUTHOR</div>
            <div className="roc">ROC</div>
            <div className="from">来自 <strong>[CSC联盟]</strong></div>
            <div className="source">数据来源：<span>Warframe.Market</span></div>
            <a className="cta" href="http://roc.war-frame.com" target="_blank" rel="noopener noreferrer">点击获取交易建议 <span className="arrow">→</span></a>
          </div>
        </div>
      </header>

      {rows.length > 0 && (
        <>
          <div className="stats fade-in">
            <Stat k="TOTAL ITEMS" v={rows.length.toLocaleString()} sub="全量静态数据总数" c1="var(--c-cyan)" c2="var(--c-violet)" gradient />
            <Stat k="MATCHED" v={visibleRows.length.toLocaleString()} sub="当前搜索匹配结果" c1="var(--c-violet)" c2="var(--c-pink)" gradient />
            <Stat k="DATA SOURCE" v="Static" sub="本地零延迟提取" c1="var(--c-pink)" c2="var(--c-amber)" gradient />
            <Stat k="STATUS" v="Ready" sub="完全断网可用" c1="var(--c-amber)" c2="var(--c-lime)" gradient />
          </div>

          <section className="card fade-in">
            <div className="heading"><span className="badge-num">01</span><h2>EXPORT</h2><span className="heading-cn">· 导出数据</span></div>
            <div className="toolbar">
              <button className="export-xlsx" onClick={() => doExport('xlsx')} disabled={!visibleRows.length}>📊 下载 Excel (.xlsx)</button>
              <button className="primary" onClick={() => doExport('csv')} disabled={!visibleRows.length}>下载 CSV</button>
              <button onClick={() => doExport('tsv')} disabled={!visibleRows.length}>下载 TSV</button>
              <button onClick={() => doExport('json')} disabled={!visibleRows.length}>下载 JSON</button>
              <button onClick={() => doExport('md')} disabled={!visibleRows.length}>下载 Markdown</button>
              <span className="spacer"></span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-faint)', letterSpacing: '0.1em' }}>
                将导出当前检索到的 <strong style={{ color: '#fff' }}>{visibleRows.length.toLocaleString()}</strong> 项
              </span>
            </div>
          </section>

          <section className="card table-card fade-in" style={{ marginTop: 18 }}>
            <div className="table-toolbar">
              <div className="search-wrap"><SearchIcon /><input type="text" placeholder="模糊搜索 中文 / English ..." value={filter} onChange={e => setFilter(e.target.value)} /></div>
              <span className="count">显示 {visibleRows.length.toLocaleString()} / {rows.length.toLocaleString()}</span>
            </div>
            <div className="table-scroll">
              {visibleRows.length === 0 ? (
                <div className="empty"><div className="big">无匹配条目</div><div>尝试更换搜索关键词 ↑</div></div>
              ) : (
                <table>
                  <thead><tr><th style={{ width: 66 }}># 行号</th><th style={{ width: '45%' }}>中文</th><th>English</th></tr></thead>
                  <tbody>
                    {visibleRows.map((r, i) => (
                      <tr key={r.id}>
                        <td style={{ color: 'var(--text-faint)', fontFamily: 'var(--mono)', fontSize: 11 }}>{r.id}</td>
                        <td className="zh">{r.zh}</td>
                        <td className="en">{r.en}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              )}
            </div>
          </section>
        </>
      )}

      {rows.length === 0 && (
        <section className="card fade-in"><div className="empty"><div className="big">未检测到数据</div><div>请在 HTML 代码中的 script 标签内放入 TXT 文本</div></div></section>
      )}

      <footer className="foot">
        <div className="left">
          <div><strong>项目状态</strong> · <span style={{ fontFamily: 'var(--mono)', background: 'rgba(255,255,255,0.06)', padding: '1px 6px', borderRadius: 4 }}>Static Offline Ready</span></div>
          <div>本工具基于纯静态构建，无需服务器介入即可高速检索与导出。</div>
        </div>
        <div className="sig">
          <div style={{ marginBottom: 6 }}>AUTHOR</div>
          <div className="by">ROC</div>
          <div style={{ marginTop: 4 }}>FROM · [CSC联盟]</div>
        </div>
      </footer>

      {toast && (<div className="toast"><span className="ok">✓</span><span>{toast.msg}</span></div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
