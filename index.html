<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>WARFRAME · 中英文物品对照表 / Roc · CSC联盟</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="author" content="Roc · CSC联盟" />
<meta name="description" content="Warframe.market 全部可交易物品中英文双语对照表生成器。作者: Roc (CSC联盟)" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg-0: #04050a;
  --bg-1: #08091a;
  --line: rgba(255,255,255,0.08);
  --line-2: rgba(255,255,255,0.16);
  --text: #f0f3ff;
  --text-dim: #8e98b8;
  --text-faint: #4d5572;
  --c-cyan:    oklch(0.82 0.20 195);
  --c-violet:  oklch(0.72 0.24 305);
  --c-pink:    oklch(0.75 0.24 350);
  --c-amber:   oklch(0.85 0.18 75);
  --c-lime:    oklch(0.86 0.20 130);
  --c-coral:   oklch(0.74 0.22 25);
  --good: oklch(0.82 0.18 150);
  --warn: oklch(0.84 0.16 75);
  --bad:  oklch(0.72 0.22 25);
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
  --display: 'Orbitron', 'Noto Sans SC', sans-serif;
  --sans: 'Space Grotesk', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; min-height: 100%; }
body {
  background: var(--bg-0);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--c-cyan), var(--c-violet)); border-radius: 10px; opacity: 0.6; }

/* ============ COSMIC BACKDROP ============ */
.bg-layer { position: fixed; inset: 0; z-index: -3; pointer-events: none; }
.bg-base {
  background:
    radial-gradient(ellipse 1200px 700px at 18% 12%, color-mix(in oklch, var(--c-cyan) 40%, transparent), transparent 60%),
    radial-gradient(ellipse 1100px 800px at 86% 22%, color-mix(in oklch, var(--c-violet) 38%, transparent), transparent 60%),
    radial-gradient(ellipse 900px 700px at 70% 92%, color-mix(in oklch, var(--c-pink) 32%, transparent), transparent 60%),
    radial-gradient(ellipse 700px 600px at 8% 88%, color-mix(in oklch, var(--c-amber) 24%, transparent), transparent 65%),
    linear-gradient(180deg, #03040a 0%, #06081a 60%, #02030a 100%);
  animation: drift 32s ease-in-out infinite alternate;
}
@keyframes drift {
  0%   { transform: scale(1) translate3d(0,0,0); }
  50%  { transform: scale(1.03) translate3d(-1.5%, 1%, 0); }
  100% { transform: scale(1.01) translate3d(2%, -1%, 0); }
}
.bg-grid {
  background-image:
    linear-gradient(rgba(120,180,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,180,255,0.06) 1px, transparent 1px);
  background-size: 64px 64px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black, transparent 75%);
  z-index: -2;
}
.bg-stars {
  background-image:
    radial-gradient(1px 1px at 12% 18%, rgba(255,255,255,0.9), transparent 60%),
    radial-gradient(1.4px 1.4px at 38% 8%, rgba(180,230,255,0.7), transparent 60%),
    radial-gradient(1px 1px at 62% 28%, rgba(255,255,255,0.6), transparent 60%),
    radial-gradient(1.6px 1.6px at 82% 48%, rgba(255,200,230,0.7), transparent 60%),
    radial-gradient(1px 1px at 24% 62%, rgba(255,255,255,0.7), transparent 60%),
    radial-gradient(1.2px 1.2px at 56% 78%, rgba(200,255,230,0.6), transparent 60%),
    radial-gradient(1px 1px at 88% 84%, rgba(255,255,255,0.6), transparent 60%),
    radial-gradient(1.5px 1.5px at 6% 42%, rgba(255,255,255,0.5), transparent 60%);
  animation: twinkle 5s ease-in-out infinite alternate;
  z-index: -2;
}
@keyframes twinkle { 0% { opacity: 0.45; } 100% { opacity: 1; } }

/* Scanlines */
.bg-scan {
  z-index: -1;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
  mix-blend-mode: overlay;
  opacity: 0.7;
}

/* Floating orbs */
.orb {
  position: fixed; z-index: -1;
  width: 540px; height: 540px;
  border-radius: 50%;
  filter: blur(90px);
  opacity: 0.42;
  pointer-events: none;
  animation: orbFloat 22s ease-in-out infinite alternate;
}
.orb.a { top: -160px; left: -120px; background: var(--c-cyan); }
.orb.b { top: 30%; right: -180px; background: var(--c-violet); animation-delay: -6s; }
.orb.c { bottom: -180px; left: 22%; background: var(--c-pink); animation-delay: -12s; }
@keyframes orbFloat {
  0%   { transform: translate(0,0) scale(1); }
  50%  { transform: translate(40px, 30px) scale(1.08); }
  100% { transform: translate(-30px, -20px) scale(0.95); }
}

/* ============ LAYOUT ============ */
.app { max-width: 1360px; margin: 0 auto; padding: 28px 28px 80px; position: relative; }

/* ============ HERO ============ */
.hero {
  position: relative;
  padding: 38px 40px 36px;
  margin-bottom: 22px;
  border-radius: 24px;
  border: 1px solid var(--line);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.012)),
    rgba(8, 10, 22, 0.6);
  backdrop-filter: blur(22px) saturate(1.3);
  -webkit-backdrop-filter: blur(22px) saturate(1.3);
  overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.04) 50%, transparent 70%);
  background-size: 250% 100%;
  animation: heroShine 7s linear infinite;
  pointer-events: none;
}
@keyframes heroShine { from { background-position: 0% 0; } to { background-position: 250% 0; } }
.hero::after {
  content: ''; position: absolute; inset: -1px; border-radius: 24px;
  padding: 1px;
  background: conic-gradient(from var(--ang, 0deg),
    transparent 0%,
    var(--c-cyan) 12%,
    transparent 24%,
    var(--c-violet) 50%,
    transparent 62%,
    var(--c-pink) 80%,
    transparent 100%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0.7; animation: spin 14s linear infinite;
  pointer-events: none;
}
@property --ang { syntax: '<angle>'; initial-value: 0deg; inherits: false; }
@keyframes spin { to { --ang: 360deg; } }

.hero-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 28px; flex-wrap: wrap; position: relative; z-index: 1; }
.hero-left { flex: 1; min-width: 320px; }

.eyebrow {
  display: inline-flex; align-items: center; gap: 10px;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 14px;
}
.eyebrow .pulse {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--c-cyan);
  box-shadow: 0 0 0 0 color-mix(in oklch, var(--c-cyan) 60%, transparent);
  animation: pulse 2.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--c-cyan) 50%, transparent); }
  50%      { box-shadow: 0 0 0 10px transparent; }
}
.eyebrow .div { width: 32px; height: 1px; background: linear-gradient(90deg, var(--text-faint), transparent); }

h1.title {
  font-family: var(--display);
  font-weight: 900;
  letter-spacing: 0.02em;
  font-size: clamp(30px, 4.6vw, 56px);
  line-height: 1.05;
  margin: 0 0 10px;
  text-transform: uppercase;
  background: linear-gradient(95deg,
    #fff 0%,
    color-mix(in oklch, var(--c-cyan) 75%, white) 30%,
    color-mix(in oklch, var(--c-violet) 75%, white) 60%,
    color-mix(in oklch, var(--c-pink) 75%, white) 85%,
    #fff 100%);
  background-size: 250% 100%;
  -webkit-background-clip: text; background-clip: text;
  color: transparent;
  animation: titleShift 9s linear infinite;
  text-shadow: 0 0 60px color-mix(in oklch, var(--c-violet) 45%, transparent);
  display: flex;
  flex-direction: column;
  gap: 2px;
}
@keyframes titleShift { from { background-position: 0% 50%; } to { background-position: 250% 50%; } }
h1.title .cn {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 900;
  letter-spacing: 0.04em;
  font-size: 0.78em;
  display: flex;
  align-items: center;
  gap: 18px;
}
h1.title .cn::after {
  content: '';
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, color-mix(in oklch, var(--c-violet) 60%, transparent), transparent);
  border-radius: 2px;
  max-width: 220px;
}
h1.title .en {
  font-size: 1em;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

p.lead {
  color: var(--text-dim);
  max-width: 64ch;
  font-size: 15.5px;
  line-height: 1.62;
  margin: 8px 0 0;
}
p.lead code {
  font-family: var(--mono); font-size: 12.5px;
  background: rgba(255,255,255,0.08);
  padding: 2px 8px; border-radius: 5px;
  border: 1px solid var(--line);
  color: color-mix(in oklch, var(--c-cyan) 70%, white);
}
p.lead strong { color: #fff; }

/* AUTHOR CARD — much bigger Roc */
.author-card {
  position: relative;
  padding: 22px 26px;
  border-radius: 18px;
  border: 1px solid var(--line-2);
  background:
    linear-gradient(150deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01)),
    rgba(8, 10, 22, 0.7);
  backdrop-filter: blur(12px);
  min-width: 280px;
  text-align: right;
  font-family: var(--mono);
  overflow: hidden;
}
.author-card::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(circle at 100% 0%, color-mix(in oklch, var(--c-cyan) 35%, transparent), transparent 60%);
  pointer-events: none;
}
.author-card .author-label {
  font-size: 10px;
  letter-spacing: 0.32em;
  color: var(--text-faint);
  margin-bottom: 4px;
  text-transform: uppercase;
}
.author-card .roc {
  font-family: var(--display);
  font-weight: 900;
  font-size: 56px;
  line-height: 0.95;
  letter-spacing: 0.04em;
  margin: 2px 0 8px;
  background: linear-gradient(115deg, var(--c-cyan) 0%, var(--c-violet) 50%, var(--c-pink) 100%);
  background-size: 200% 100%;
  -webkit-background-clip: text; background-clip: text; color: transparent;
  animation: titleShift 6s linear infinite;
  text-shadow: 0 0 40px color-mix(in oklch, var(--c-violet) 55%, transparent);
  filter: drop-shadow(0 4px 18px color-mix(in oklch, var(--c-violet) 50%, transparent));
}
.author-card .from {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  margin-bottom: 10px;
}
.author-card .from strong {
  color: #fff; font-weight: 700; letter-spacing: 0.06em;
  background: linear-gradient(90deg, var(--c-amber), var(--c-pink));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.author-card .source {
  font-size: 11px;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  border-top: 1px solid var(--line);
  padding-top: 10px;
  margin-top: 6px;
}
.author-card .source span { color: var(--text-dim); font-weight: 500; }
.author-card .cta {
  display: inline-flex; align-items: center; gap: 8px;
  margin-top: 12px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid color-mix(in oklch, var(--c-cyan) 55%, transparent);
  background: color-mix(in oklch, var(--c-cyan) 15%, transparent);
  color: #fff;
  text-decoration: none;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.06em;
  font-family: var(--sans);
  transition: transform .18s, border-color .18s, background .18s, box-shadow .18s;
}
.author-card .cta:hover {
  transform: translateY(-2px);
  border-color: var(--c-cyan);
  background: color-mix(in oklch, var(--c-cyan) 28%, transparent);
  box-shadow: 0 8px 24px -8px color-mix(in oklch, var(--c-cyan) 60%, transparent);
}
.author-card .cta .arrow { transition: transform .18s; }
.author-card .cta:hover .arrow { transform: translateX(3px); }

/* ============ CARDS ============ */
.card {
  position: relative;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: rgba(10, 13, 26, 0.55);
  backdrop-filter: blur(16px) saturate(1.2);
  -webkit-backdrop-filter: blur(16px) saturate(1.2);
  padding: 24px 26px;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
  background: linear-gradient(180deg, var(--c-cyan), var(--c-violet), var(--c-pink));
  opacity: 0.6;
}
.card + .card { margin-top: 18px; }

.heading { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
.heading .badge-num {
  width: 30px; height: 30px;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--c-cyan), var(--c-violet));
  color: #04060c; font-family: var(--display); font-weight: 800; font-size: 13px;
  box-shadow: 0 4px 14px -4px color-mix(in oklch, var(--c-violet) 70%, transparent);
}
.heading h2 {
  font-family: var(--display);
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-dim);
  margin: 0;
  font-weight: 700;
}
.heading .heading-cn {
  font-family: 'Noto Sans SC', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  margin-left: 4px;
}

/* Form */
.row { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; }
.row + .row { margin-top: 14px; }
.field { display: flex; flex-direction: column; gap: 6px; }
.field label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-faint);
}
select, input[type=text] {
  background: rgba(4, 5, 12, 0.85);
  color: var(--text);
  border: 1px solid var(--line-2);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: var(--sans);
  font-size: 13.5px;
  min-width: 220px;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
select:focus, input[type=text]:focus {
  outline: none;
  border-color: color-mix(in oklch, var(--c-cyan) 75%, transparent);
  box-shadow: 0 0 0 3px color-mix(in oklch, var(--c-cyan) 22%, transparent);
}

button {
  position: relative;
  background: rgba(255,255,255,0.04);
  color: var(--text);
  border: 1px solid var(--line-2);
  border-radius: 11px;
  padding: 11px 18px;
  font-family: var(--sans);
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
  letter-spacing: 0.02em;
  transition: border-color .2s, transform .15s, background .2s, box-shadow .2s, color .2s;
  overflow: hidden;
  white-space: nowrap;
}
button:hover:not(:disabled) {
  border-color: color-mix(in oklch, var(--c-cyan) 70%, transparent);
  background: rgba(255,255,255,0.07);
  transform: translateY(-1px);
}
button:active:not(:disabled) { transform: translateY(0); }
button:disabled { opacity: 0.35; cursor: not-allowed; }
button.primary {
  background: linear-gradient(135deg, var(--c-cyan), var(--c-violet));
  border-color: transparent;
  color: #04060c;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  box-shadow:
    0 8px 28px -8px color-mix(in oklch, var(--c-violet) 70%, transparent),
    inset 0 1px 0 rgba(255,255,255,0.5);
}
button.primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 12px 36px -10px color-mix(in oklch, var(--c-violet) 80%, transparent), inset 0 1px 0 rgba(255,255,255,0.5); }
button.primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.45) 50%, transparent 70%);
  transform: translateX(-100%);
  transition: transform .8s;
}
button.primary:hover::after { transform: translateX(100%); }
button.danger { color: var(--bad); border-color: color-mix(in oklch, var(--bad) 50%, transparent); }
button.ghost { background: transparent; }
button.export-xlsx {
  background: linear-gradient(135deg, var(--c-lime), var(--c-amber));
  color: #051010; font-weight: 800; border-color: transparent;
  box-shadow: 0 8px 24px -10px color-mix(in oklch, var(--c-lime) 70%, transparent);
}
button.export-xlsx:hover:not(:disabled) { filter: brightness(1.08); }

.toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
.toolbar .spacer { flex: 1; }

/* Progress + log */
.progress {
  height: 5px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 16px;
  position: relative;
}
.progress > div {
  height: 100%;
  background: linear-gradient(90deg, var(--c-cyan), var(--c-violet), var(--c-pink), var(--c-amber));
  background-size: 250% 100%;
  animation: progressShimmer 1.4s linear infinite;
  transition: width .35s ease;
  box-shadow: 0 0 16px color-mix(in oklch, var(--c-violet) 60%, transparent);
}
@keyframes progressShimmer { to { background-position: 250% 0; } }

.log {
  margin-top: 16px;
  background: rgba(0,0,0,0.55);
  border: 1px solid var(--line);
  border-radius: 11px;
  padding: 12px 16px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-dim);
  max-height: 180px;
  overflow-y: auto;
  scroll-behavior: smooth;
}
.log .line { padding: 2px 0; white-space: pre-wrap; opacity: 0; transform: translateY(4px); animation: logIn .25s ease forwards; }
@keyframes logIn { to { opacity: 1; transform: none; } }
.log .ts { color: var(--text-faint); margin-right: 10px; }
.log .ok .msg { color: var(--good); }
.log .warn .msg { color: var(--warn); }
.log .err .msg { color: var(--bad); }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin: 22px 0;
}
@media (max-width: 720px) { .stats { grid-template-columns: repeat(2, 1fr); } }
.stat {
  position: relative;
  background: rgba(10, 13, 26, 0.55);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 18px 20px;
  overflow: hidden;
  backdrop-filter: blur(12px);
}
.stat::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--c1, var(--c-cyan)), var(--c2, var(--c-violet)));
}
.stat::after {
  content: ''; position: absolute; right: -50px; top: -50px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, color-mix(in oklch, var(--c1, var(--c-cyan)) 45%, transparent), transparent 60%);
  filter: blur(20px); opacity: 0.5;
}
.stat .k {
  font-family: var(--mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  color: var(--text-faint);
  position: relative; z-index: 1;
}
.stat .v {
  font-family: var(--display);
  font-weight: 800;
  font-size: 32px;
  margin-top: 6px;
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
  position: relative; z-index: 1;
}
.stat .v.gradient {
  background: linear-gradient(120deg, var(--c1, var(--c-cyan)), var(--c2, var(--c-violet)));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}
.stat .sub {
  font-family: var(--mono); font-size: 10px;
  color: var(--text-faint); letter-spacing: 0.1em;
  margin-top: 4px; position: relative; z-index: 1;
}

/* Chips */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: inline-flex; align-items: center; gap: 9px;
  padding: 8px 14px;
  border-radius: 999px;
  border: 1px solid var(--line-2);
  background: rgba(255,255,255,0.03);
  font-size: 12px;
  color: var(--text-dim);
  cursor: pointer;
  user-select: none;
  transition: border-color .15s, background .15s, color .15s, transform .12s, box-shadow .15s;
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.chip:hover { border-color: var(--line-2); background: rgba(255,255,255,0.07); transform: translateY(-1px); }
.chip.on {
  background: linear-gradient(135deg, color-mix(in oklch, var(--c, var(--c-cyan)) 30%, transparent), color-mix(in oklch, var(--c, var(--c-cyan)) 12%, transparent));
  border-color: color-mix(in oklch, var(--c, var(--c-cyan)) 65%, transparent);
  color: #fff;
  box-shadow: 0 4px 18px -8px color-mix(in oklch, var(--c, var(--c-cyan)) 70%, transparent);
}
.chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--c, var(--c-cyan)); box-shadow: 0 0 8px var(--c, var(--c-cyan)); }
.chip .count {
  font-size: 10px;
  background: rgba(0,0,0,0.45);
  padding: 1px 7px;
  border-radius: 999px;
  color: var(--text-dim);
}
.chip.on .count { background: rgba(0,0,0,0.4); color: #fff; }

.chip-bar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.chip-bar .mini { font-family: var(--mono); font-size: 11px; color: var(--text-faint); display: inline-flex; gap: 6px; }
.chip-bar .mini button { padding: 5px 11px; font-size: 11px; border-radius: 7px; font-family: var(--mono); }

/* Table */
.table-card { padding: 0; }
.table-toolbar {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--line);
  background: rgba(255,255,255,0.02);
}
.search-wrap { position: relative; flex: 1; max-width: 480px; }
.search-wrap input { width: 100%; padding-left: 38px; }
.search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); }
.table-toolbar .count {
  margin-left: auto;
  color: var(--text-faint);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
}
.table-scroll { max-height: 600px; overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th {
  position: sticky; top: 0; z-index: 1;
  background: rgba(8,10,20,0.96);
  backdrop-filter: blur(8px);
  text-align: left;
  padding: 12px 20px;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-faint);
  border-bottom: 1px solid var(--line);
  font-weight: 700;
  font-family: var(--mono);
}
tbody td {
  padding: 11px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  vertical-align: middle;
}
tbody tr { transition: background .14s; }
tbody tr:hover td { background: rgba(255,255,255,0.04); }
td.zh { color: #fff; font-weight: 500; font-family: 'Noto Sans SC', sans-serif; }
td.en { color: var(--text-dim); font-family: var(--mono); font-size: 12.5px; }
.cat-pill {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 999px;
  font-size: 10px;
  font-family: var(--mono);
  letter-spacing: 0.06em;
  background: color-mix(in oklch, var(--c, var(--c-cyan)) 18%, transparent);
  color: color-mix(in oklch, var(--c, var(--c-cyan)) 95%, white);
  border: 1px solid color-mix(in oklch, var(--c, var(--c-cyan)) 35%, transparent);
}
.empty { padding: 70px 24px; text-align: center; color: var(--text-faint); font-size: 13px; }
.empty .big { font-size: 18px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; font-family: var(--display); letter-spacing: 0.06em; }

/* Footer */
footer.foot {
  margin-top: 32px;
  padding: 26px 28px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(6,8,18,0.55);
  backdrop-filter: blur(12px);
  display: flex; justify-content: space-between; gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}
footer.foot .left { font-size: 12.5px; color: var(--text-faint); line-height: 1.75; }
footer.foot .left strong { color: var(--text-dim); font-weight: 700; }
footer.foot .left a { color: color-mix(in oklch, var(--c-cyan) 80%, white); text-decoration: none; }
footer.foot .left a:hover { text-decoration: underline; }
footer.foot .sig { text-align: right; font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; color: var(--text-faint); }
footer.foot .sig .by {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 900; letter-spacing: 0.06em;
  background: linear-gradient(115deg, var(--c-cyan), var(--c-violet), var(--c-pink));
  -webkit-background-clip: text; background-clip: text; color: transparent;
}

/* Toast */
.toast {
  position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  padding: 12px 22px;
  background: rgba(8,10,20,0.95);
  border: 1px solid var(--line-2);
  border-radius: 999px;
  color: #fff; font-size: 13px;
  font-family: var(--mono);
  display: flex; align-items: center; gap: 10px;
  backdrop-filter: blur(12px);
  animation: toastIn .25s ease, toastOut .25s ease forwards 2.4s;
  box-shadow: 0 14px 40px -12px rgba(0,0,0,0.8);
}
.toast .ok { color: var(--good); font-weight: 700; }
@keyframes toastIn { from { transform: translate(-50%, 30px); opacity: 0; } }
@keyframes toastOut { to { transform: translate(-50%, 30px); opacity: 0; } }

.fade-in { animation: fadeUp .5s ease both; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
</style>

<div class="bg-layer bg-base"></div>
<div class="bg-layer bg-grid"></div>

<div class="orb c"></div>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

const ENDPOINTS = {
  v1: 'https://api.warframe.market/v1/items',
  v2: 'https://api.warframe.market/v2/items',
};
const PROXIES = {
  corsh:      { label: 'corsproxy.io  (推荐)',     wrap: u => 'https://corsproxy.io/?' + encodeURIComponent(u) },
  allorigins: { label: 'allorigins.win',           wrap: u => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(u) },
  thingproxy: { label: 'thingproxy.freeboard.io',  wrap: u => 'https://thingproxy.freeboard.io/fetch/' + u },
  none:       { label: '直连 (大概率失败)',         wrap: u => u },
};
const ZH_CODES = ['zh-hans', 'zh'];

const CATEGORIES = [
  { id: 'prime_set',    label: 'Prime 套装',        color: 'oklch(0.86 0.18 80)',  rule: (slug) => /_prime_set$/.test(slug) },
  { id: 'prime_part',   label: 'Prime 部件',        color: 'oklch(0.82 0.16 75)',  rule: (slug) => /_prime_/.test(slug) && /(blueprint|chassis|systems|neuroptics|carapace|cerebrum|wings|harness|stock|barrel|receiver|grip|blade|handle|disc|head|string|gauntlet|ornament|link|lower_limb|upper_limb)/.test(slug) },
  { id: 'warframe_set', label: 'Warframe 套装',     color: 'oklch(0.74 0.20 215)', rule: (slug) => /^(ash|atlas|baruuk|banshee|caliban|chroma|citrine|dagath|dante|ember|equinox|excalibur|frost|gara|garuda|gauss|grendel|gyre|harrow|hildryn|hydroid|inaros|ivara|khora|kullervo|lavos|limbo|loki|mag|mesa|mirage|nekros|nezha|nidus|nova|nyx|oberon|octavia|protea|qorvex|revenant|rhino|saryn|sevagoth|styanax|titania|trinity|valkyr|vauban|volt|voruna|wisp|wukong|xaku|yareli|zephyr)_set$/.test(slug) },
  { id: 'warframe',     label: 'Warframe',          color: 'oklch(0.78 0.18 195)', rule: (slug, thumb) => /\/warframes\//.test(thumb) },
  { id: 'mod',          label: 'Mod / 模组',        color: 'oklch(0.74 0.21 305)', rule: (slug, thumb) => /\/mods\//.test(thumb) || /(_mod)$/.test(slug) },
  { id: 'arcane',       label: 'Arcane 灵化',       color: 'oklch(0.78 0.19 285)', rule: (slug, thumb) => /\/arcanes?\//.test(thumb) || /^(arcane_|magus_|virtuos_|exodia_|theorem_|cascadia_)/.test(slug) || /_arcane$/.test(slug) },
  { id: 'relic',        label: '虚空遗物',          color: 'oklch(0.74 0.20 15)',  rule: (slug, thumb) => /\/relics?\//.test(thumb) || /^(lith|meso|neo|axi|requiem)_[a-z0-9]+_relic$/.test(slug) },
  { id: 'requiem',      label: 'Requiem 安魂',      color: 'oklch(0.78 0.18 340)', rule: (slug) => /^(fass|jahu|khra|lohk|netra|ris|vome|xata)$/.test(slug) },
  { id: 'lich_weapon',  label: '弑君武器 (Kuva)',   color: 'oklch(0.74 0.20 30)',  rule: (slug) => /^kuva_/.test(slug) },
  { id: 'sister_weapon',label: '帕弗弑君 (Tenet)',  color: 'oklch(0.78 0.18 320)', rule: (slug) => /^tenet_/.test(slug) },
  { id: 'fish',         label: '鱼类标本',          color: 'oklch(0.78 0.16 195)', rule: (slug, thumb) => /\/fish\//.test(thumb) },
  { id: 'gem',          label: '宝石矿石',          color: 'oklch(0.82 0.18 145)', rule: (slug, thumb) => /\/(gems|resources)\//.test(thumb) },
  { id: 'captura',      label: 'Captura 场景',      color: 'oklch(0.74 0.18 240)', rule: (slug, thumb) => /captura/.test(slug) || /\/captura/.test(thumb) },
  { id: 'imprint',      label: 'Imprint 印记',      color: 'oklch(0.78 0.16 260)', rule: (slug) => /_imprint$/.test(slug) },
  { id: 'skin',         label: '皮肤 / Skin',       color: 'oklch(0.78 0.14 260)', rule: (slug, thumb) => /\/skins?\//.test(thumb) || /(_skin|_helmet|_armor|_syandana|_sigil)$/.test(slug) },
  { id: 'weapon',       label: '武器',              color: 'oklch(0.74 0.20 35)',  rule: () => true },
];
const CATEGORY_BY_ID = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

function classify(slug, thumb) {
  for (const cat of CATEGORIES) {
    try { if (cat.rule(slug, thumb || '')) return cat.id; } catch {}
  }
  return 'weapon';
}

async function fetchItems({ apiVersion, lang, proxy, signal }) {
  const baseUrl = ENDPOINTS[apiVersion];
  const url = PROXIES[proxy].wrap(baseUrl);
  const res = await fetch(url, {
    method: 'GET',
    headers: { 'Accept': 'application/json', 'Language': lang, 'Platform': 'pc' },
    signal,
  });
  if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);
  const json = await res.json();
  return json?.payload?.items ?? json?.data ?? json?.items ?? [];
}
function normalizeItem(it) {
  return {
    id: it.id || it._id || it.uid || '',
    url_name: it.url_name || it.urlName || it.slug || '',
    item_name: it.item_name || it.itemName || it.name || it.i18n?.name || '',
    thumb: it.thumb || it.thumbnail || it.icon || '',
  };
}
function mergeBilingual(enList, zhList) {
  const enMap = new Map(); for (const r of enList) { const n = normalizeItem(r); if (n.url_name) enMap.set(n.url_name, n); }
  const zhMap = new Map(); for (const r of zhList) { const n = normalizeItem(r); if (n.url_name) zhMap.set(n.url_name, n); }
  const allKeys = new Set([...enMap.keys(), ...zhMap.keys()]);
  const merged = [];
  for (const k of allKeys) {
    const en = enMap.get(k); const zh = zhMap.get(k);
    const slug = k;
    const thumb = en?.thumb || zh?.thumb || '';
    merged.push({ url_name: slug, en: en?.item_name || '', zh: zh?.item_name || '', cat: classify(slug, thumb) });
  }
  merged.sort((a, b) => (a.zh || a.en).localeCompare(b.zh || b.en, 'zh-Hans-CN'));
  return merged;
}

/* Exports */
function csvEscape(s) {
  const v = String(s ?? '');
  if (/[",\n\r]/.test(v)) return '"' + v.replace(/"/g, '""') + '"';
  return v;
}
function buildCSV(rows) {
  const lines = ['中文,English'];
  for (const r of rows) lines.push([r.zh, r.en].map(csvEscape).join(','));
  return '\ufeff' + lines.join('\r\n');
}
function buildTSV(rows) {
  const lines = ['中文\tEnglish'];
  for (const r of rows) lines.push((r.zh || '').replace(/\t/g, ' ') + '\t' + (r.en || '').replace(/\t/g, ' '));
  return '\ufeff' + lines.join('\r\n');
}
function buildJSON(rows) { return JSON.stringify(rows.map(r => ({ 中文: r.zh, English: r.en })), null, 2); }
function buildMD(rows) {
  const lines = ['| 中文 | English |', '| --- | --- |'];
  for (const r of rows) lines.push(`| ${(r.zh || '').replace(/\|/g, '\\|')} | ${(r.en || '').replace(/\|/g, '\\|')} |`);
  return lines.join('\n');
}
function buildXLSX(rows) {
  // Real .xlsx via SheetJS — formatted with frozen header, column widths
  const data = [['中文', 'English'], ...rows.map(r => [r.zh, r.en])];
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{ wch: 36 }, { wch: 44 }];
  ws['!freeze'] = { xSplit: 0, ySplit: 1 };
  ws['!autofilter'] = { ref: `A1:B${data.length}` };
  // Style the header row (bold-ish via cell metadata; SheetJS Community is limited but col widths apply)
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Warframe Bilingual');
  // Embed authorship metadata
  wb.Props = {
    Title: 'Warframe 中英文物品对照表',
    Subject: 'Warframe.market bilingual item names',
    Author: 'Roc',
    Company: 'CSC联盟',
    CreatedDate: new Date(),
  };
  return XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
}
function triggerDownload(filename, content, mime) {
  const blob = new Blob([content], { type: mime + ';charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
}

function Stat({ k, v, sub, c1, c2, gradient }) {
  return (
    <div className="stat" style={{ '--c1': c1, '--c2': c2 }}>
      <div className="k">{k}</div>
      <div className={'v ' + (gradient ? 'gradient' : '')}>{v}</div>
      {sub && <div className="sub">{sub}</div>}
    </div>
  );
}

function SearchIcon() {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/>
    </svg>
  );
}

function App() {
  const [apiVersion, setApiVersion] = useState('v1');
  const [zhCode, setZhCode] = useState('zh-hans');
  const [proxy, setProxy] = useState('corsh');

  const [phase, setPhase] = useState('idle');
  const [progress, setProgress] = useState(0);
  const [logs, setLogs] = useState([]);
  const [rows, setRows] = useState([]);
  const [filter, setFilter] = useState('');
  const [selectedCats, setSelectedCats] = useState(() => new Set(CATEGORIES.map(c => c.id)));
  const [toast, setToast] = useState(null);
  const abortRef = useRef(null);
  const logRef = useRef(null);

  const log = useCallback((msg, level = 'info') => {
    const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
    setLogs(L => [...L, { ts, msg, level }]);
  }, []);
  useEffect(() => { if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight; }, [logs]);

  const flashToast = useCallback((msg) => {
    setToast({ id: Date.now(), msg });
    setTimeout(() => setToast(null), 2600);
  }, []);

  const run = useCallback(async () => {
    if (phase === 'busy') return;
    setLogs([]); setRows([]); setProgress(0); setPhase('busy');
    const controller = new AbortController(); abortRef.current = controller;
    log(`API: ${apiVersion.toUpperCase()}  ·  代理: ${PROXIES[proxy].label}`, 'info');

    try {
      log('请求英文物品列表 (Language: en) ...', 'info');
      setProgress(20);
      const enList = await fetchItems({ apiVersion, lang: 'en', proxy, signal: controller.signal });
      log(`✓ 英文返回 ${enList.length} 项`, 'ok');
      setProgress(55);

      const zhCandidates = [zhCode, ...ZH_CODES.filter(c => c !== zhCode)];
      let zhList = []; let lastErr = null;
      for (const code of zhCandidates) {
        try {
          log(`请求中文物品列表 (Language: ${code}) ...`, 'info');
          const list = await fetchItems({ apiVersion, lang: code, proxy, signal: controller.signal });
          const sampleN = Math.min(20, list.length, enList.length);
          let differing = 0;
          for (let i = 0; i < sampleN; i++) {
            const a = (list[i]?.item_name || list[i]?.name || '');
            const b = (enList[i]?.item_name || enList[i]?.name || '');
            if (a && b && a !== b) differing++;
          }
          if (differing >= Math.max(1, Math.floor(sampleN / 4))) {
            zhList = list;
            log(`✓ 中文返回 ${list.length} 项 (${code})`, 'ok');
            break;
          } else log(`代码 ${code} 返回的内容与英文几乎相同，尝试下一个...`, 'warn');
        } catch (e) { lastErr = e; log(`代码 ${code} 失败: ${e.message}`, 'warn'); }
      }
      if (!zhList.length) { if (lastErr) throw lastErr; throw new Error('未能获取到有效的中文数据'); }
      setProgress(85);

      log('按 url_name 合并并自动分类 ...', 'info');
      const merged = mergeBilingual(enList, zhList).filter(r => r.zh && r.en);
      setRows(merged);
      setProgress(100);

      const tally = {};
      for (const r of merged) tally[r.cat] = (tally[r.cat] || 0) + 1;
      const summary = Object.entries(tally).map(([k, v]) => `${CATEGORY_BY_ID[k]?.label || k}: ${v}`).join(' · ');
      log(`✓ 完成 — 共 ${merged.length} 项 — ${summary}`, 'ok');
      setPhase('ok');
      flashToast(`已获取 ${merged.length} 项中英文对照`);
    } catch (e) {
      if (e.name === 'AbortError') { log('已取消', 'warn'); setPhase('idle'); }
      else {
        log('✗ ' + e.message, 'err');
        if (proxy === 'none') log('提示：请切换为 corsproxy.io / allorigins.win 等代理重试。', 'warn');
        else log('提示：可尝试切换其他代理选项。', 'warn');
        setPhase('error');
      }
    } finally { abortRef.current = null; }
  }, [apiVersion, proxy, zhCode, phase, log, flashToast]);

  const cancel = useCallback(() => abortRef.current?.abort(), []);

  const exportRows = useMemo(() => rows.filter(r => selectedCats.has(r.cat)), [rows, selectedCats]);

  const doExport = useCallback((format) => {
    if (!exportRows.length) return;
    const date = new Date().toISOString().slice(0, 10);
    const stem = `warframe-bilingual_${date}`;
    if (format === 'csv')       triggerDownload(stem + '.csv',  buildCSV(exportRows),  'text/csv');
    else if (format === 'tsv')  triggerDownload(stem + '.tsv',  buildTSV(exportRows),  'text/tab-separated-values');
    else if (format === 'json') triggerDownload(stem + '.json', buildJSON(exportRows), 'application/json');
    else if (format === 'md')   triggerDownload(stem + '.md',   buildMD(exportRows),   'text/markdown');
    else if (format === 'xlsx') {
      const arr = buildXLSX(exportRows);
      const blob = new Blob([arr], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = stem + '.xlsx';
      document.body.appendChild(a); a.click();
      setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
    }
    flashToast(`已导出 ${exportRows.length} 项 (${format.toUpperCase()})`);
    log(`已导出 ${exportRows.length} 项 → ${stem}.${format}`, 'ok');
  }, [exportRows, flashToast, log]);

  const toggleCat = useCallback((id) => {
    setSelectedCats(prev => {
      const n = new Set(prev);
      if (n.has(id)) n.delete(id); else n.add(id);
      return n;
    });
  }, []);
  const selectAllCats = () => setSelectedCats(new Set(CATEGORIES.map(c => c.id)));
  const selectNoneCats = () => setSelectedCats(new Set());
  const invertCats = () => setSelectedCats(prev => {
    const n = new Set();
    for (const c of CATEGORIES) if (!prev.has(c.id)) n.add(c.id);
    return n;
  });

  const visibleRows = useMemo(() => {
    let r = rows.filter(x => selectedCats.has(x.cat));
    if (filter.trim()) {
      const q = filter.trim().toLowerCase();
      r = r.filter(x => x.zh.toLowerCase().includes(q) || x.en.toLowerCase().includes(q));
    }
    return r;
  }, [rows, filter, selectedCats]);

  const stats = useMemo(() => ({
    total: rows.length,
    selected: exportRows.length,
    cats: new Set(rows.map(r => r.cat)).size,
  }), [rows, exportRows]);

  const catTally = useMemo(() => {
    const t = {};
    for (const r of rows) t[r.cat] = (t[r.cat] || 0) + 1;
    return t;
  }, [rows]);

  return (
    <div className="app">
      <header className="hero">
        <div className="hero-row">
          <div className="hero-left">
            <span className="eyebrow">
              <span className="pulse"></span>
              WARFRAME · MARKETPLACE LEXICON
              <span className="div"></span>
              v3.0
            </span>
            <h1 className="title">
              <span className="cn">中英对照</span>
              <span className="en">BILINGUAL ITEM ATLAS</span>
            </h1>
            <p className="lead">
              基于 <code>warframe.market</code> 公开 API，一键获取全部可交易物品的
              <strong> 中文 ↔ English </strong>
              一一对应映射。支持按物品类型筛选，导出 <strong>Excel / CSV / TSV / JSON / Markdown</strong>。
            </p>
          </div>
          <div className="author-card">
            <div className="author-label">AUTHOR</div>
            <div className="roc">ROC</div>
            <div className="from">来自 <strong>[CSC联盟]</strong></div>
            <div className="source">数据来源：<span>Warframe.Market</span></div>
            <a className="cta" href="http://roc.war-frame.com" target="_blank" rel="noopener noreferrer">
              点击获取交易建议 <span className="arrow">→</span>
            </a>
          </div>
        </div>
      </header>

      <section className="card fade-in">
        <div className="heading">
          <span className="badge-num">01</span>
          <h2>DATA SOURCE</h2>
          <span className="heading-cn">· 数据源</span>
        </div>
        <div className="row">
          <div className="field">
            <label>API VERSION</label>
            <select value={apiVersion} onChange={e => setApiVersion(e.target.value)} disabled={phase === 'busy'}>
              <option value="v1">v1 · 稳定 (推荐)</option>
              <option value="v2">v2 · 实验性</option>
            </select>
          </div>
          <div className="field">
            <label>中文 LANG CODE</label>
            <select value={zhCode} onChange={e => setZhCode(e.target.value)} disabled={phase === 'busy'}>
              <option value="zh-hans">zh-hans · 简体</option>
              <option value="zh">zh</option>
            </select>
          </div>
          <div className="field">
            <label>CORS 代理</label>
            <select value={proxy} onChange={e => setProxy(e.target.value)} disabled={phase === 'busy'}>
              {Object.entries(PROXIES).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
            </select>
          </div>
          <div className="toolbar" style={{ marginLeft: 'auto' }}>
            {phase === 'busy'
              ? <button className="ghost danger" onClick={cancel}>取消</button>
              : <button className="primary" onClick={run}>{rows.length ? '重新拉取' : '开始拉取'}</button>}
          </div>
        </div>

        {phase === 'busy' && <div className="progress"><div style={{ width: progress + '%' }} /></div>}

        <div className="log" ref={logRef}>
          {logs.length === 0 && (
            <div className="line"><span className="ts">--:--:--</span><span className="msg" style={{ color: 'var(--text-faint)' }}>等待操作 — 点击"开始拉取"加载约 3500 项物品。</span></div>
          )}
          {logs.map((l, i) => (
            <div key={i} className={'line ' + l.level}>
              <span className="ts">{l.ts}</span><span className="msg">{l.msg}</span>
            </div>
          ))}
        </div>
      </section>

      {rows.length > 0 && (
        <>
          <div className="stats fade-in">
            <Stat k="TOTAL ITEMS" v={stats.total.toLocaleString()} sub="全部已拉取" c1="var(--c-cyan)" c2="var(--c-violet)" gradient />
            <Stat k="EXPORT QUEUE" v={stats.selected.toLocaleString()} sub="将进入导出文件" c1="var(--c-violet)" c2="var(--c-pink)" gradient />
            <Stat k="CATEGORIES" v={stats.cats} sub="已识别类别数" c1="var(--c-pink)" c2="var(--c-amber)" gradient />
            <Stat k="SOURCE" v="WFM" sub="warframe.market · public api" c1="var(--c-amber)" c2="var(--c-lime)" gradient />
          </div>

          <section className="card fade-in">
            <div className="heading">
              <span className="badge-num">02</span>
              <h2>CATEGORY FILTER</h2>
              <span className="heading-cn">· 类型筛选</span>
            </div>
            <div className="chip-bar" style={{ marginBottom: 14 }}>
              <span className="mini" style={{ color: 'var(--text-dim)' }}>勾选要包含在导出中的物品类型：</span>
              <span className="mini">
                <button className="ghost" onClick={selectAllCats}>全选</button>
                <button className="ghost" onClick={selectNoneCats}>清空</button>
                <button className="ghost" onClick={invertCats}>反选</button>
              </span>
            </div>
            <div className="chips">
              {CATEGORIES.map(c => {
                const n = catTally[c.id] || 0;
                if (n === 0) return null;
                const on = selectedCats.has(c.id);
                return (
                  <span key={c.id} className={'chip ' + (on ? 'on' : '')} style={{ '--c': c.color }} onClick={() => toggleCat(c.id)}>
                    <span className="dot"></span><span>{c.label}</span><span className="count">{n}</span>
                  </span>
                );
              })}
            </div>
          </section>

          <section className="card fade-in">
            <div className="heading">
              <span className="badge-num">03</span>
              <h2>EXPORT</h2>
              <span className="heading-cn">· 导出</span>
            </div>
            <div className="toolbar">
              <button className="export-xlsx" onClick={() => doExport('xlsx')} disabled={!exportRows.length}>📊 下载 Excel (.xlsx)</button>
              <button className="primary" onClick={() => doExport('csv')} disabled={!exportRows.length}>下载 CSV</button>
              <button onClick={() => doExport('tsv')} disabled={!exportRows.length}>下载 TSV</button>
              <button onClick={() => doExport('json')} disabled={!exportRows.length}>下载 JSON</button>
              <button onClick={() => doExport('md')} disabled={!exportRows.length}>下载 Markdown</button>
              <span className="spacer"></span>
              <span style={{ fontFamily: 'var(--mono)', fontSize: 11, color: 'var(--text-faint)', letterSpacing: '0.1em' }}>
                将导出 <strong style={{ color: '#fff' }}>{exportRows.length.toLocaleString()}</strong> / {rows.length.toLocaleString()} 项
              </span>
            </div>
          </section>

          <section className="card table-card fade-in" style={{ marginTop: 18 }}>
            <div className="table-toolbar">
              <div className="search-wrap">
                <SearchIcon />
                <input type="text" placeholder="搜索  中文 / English ..." value={filter} onChange={e => setFilter(e.target.value)} />
              </div>
              <span className="count">显示 {visibleRows.length.toLocaleString()} / {rows.length.toLocaleString()}</span>
            </div>
            <div className="table-scroll">
              {visibleRows.length === 0 ? (
                <div className="empty"><div className="big">无匹配条目</div><div>调整搜索词或类型筛选 ↑</div></div>
              ) : (
                <table>
                  <thead>
                    <tr>
                      <th style={{ width: 56 }}>#</th>
                      <th style={{ width: '38%' }}>中文</th>
                      <th>English</th>
                      <th style={{ width: 170 }}>类别</th>
                    </tr>
                  </thead>
                  <tbody>
                    {visibleRows.slice(0, 800).map((r, i) => {
                      const cat = CATEGORY_BY_ID[r.cat];
                      return (
                        <tr key={r.url_name}>
                          <td style={{ color: 'var(--text-faint)', fontFamily: 'var(--mono)', fontSize: 11 }}>{i + 1}</td>
                          <td className="zh">{r.zh}</td>
                          <td className="en">{r.en}</td>
                          <td><span className="cat-pill" style={{ '--c': cat?.color || 'var(--c-cyan)' }}>{cat?.label || r.cat}</span></td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              )}
              {visibleRows.length > 800 && (
                <div style={{ padding: '12px 20px', color: 'var(--text-faint)', fontSize: 11, fontFamily: 'var(--mono)', borderTop: '1px solid var(--line)' }}>
                  表格仅预览前 800 行 — 完整 {visibleRows.length.toLocaleString()} 行会包含在导出文件中
                </div>
              )}
            </div>
          </section>
        </>
      )}

      {rows.length === 0 && phase !== 'busy' && (
        <section className="card fade-in">
          <div className="empty">
            <div className="big">READY</div>
            <div>调整上方设置，然后点击 <strong style={{ color: 'var(--text-dim)' }}>开始拉取</strong></div>
          </div>
        </section>
      )}

      <footer className="foot">
        <div className="left">
          <div><strong>数据来源</strong> · Warframe.Market 公开 API <a href="https://warframe.market/api_docs" target="_blank" rel="noopener noreferrer">api_docs ↗</a></div>
          <div><strong>API v2 文档</strong> · <a href="https://42bytes.notion.site/WFM-Api-v2-Documentation-5d987e4aa2f74b55a80db1a09932459d" target="_blank" rel="noopener noreferrer">42bytes ↗</a></div>
          <div><strong>交易建议</strong> · <a href="http://roc.war-frame.com" target="_blank" rel="noopener noreferrer">roc.war-frame.com ↗</a></div>
          <div style={{ marginTop: 6 }}>本工具仅做语言映射，不会写入任何账号数据。</div>
        </div>
        <div className="sig">
          <div style={{ marginBottom: 6 }}>AUTHOR</div>
          <div className="by">ROC</div>
          <div style={{ marginTop: 4 }}>FROM · [CSC联盟]</div>
        </div>
      </footer>

      {toast && (<div className="toast"><span className="ok">✓</span><span>{toast.msg}</span></div>)}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
